<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/guest}">
<head>
    <title>Thanh toán thất bại</title>
    <th:block layout:fragment="css">
        <link rel="stylesheet" th:href="@{/assets/css/common.css}">
        <style>
            :root {
                --danger-cl: #dc3545;
                --danger-cl-darker: #c82333;
                --default-cl: #9e5bab;
                --white-cl-1: #fff;
                --shadow-medium: 0 4px 15px rgba(0, 0, 0, 0.15);
                --base-transition: all 0.3s ease;
                --base-radius: 6px;
            }

            .error-container {
                max-width: 600px;
                margin: 50px auto;
                padding: 40px;
                background-color: var(--white-cl-1, #fff);
                border-radius: var(--base-radius, 8px);
                text-align: center;
                box-shadow: var(--shadow-medium, 0 4px 15px rgba(0,0,0,0.15));
                border-top: 5px solid var(--danger-cl, #dc3545);
            }

            .error-icon {
                font-size: 5rem;
                color: var(--danger-cl, #dc3545);
                margin-bottom: 25px;
                animation: shake 0.5s ease-in-out;
            }

            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                50% { transform: translateX(10px); }
                75% { transform: translateX(-10px); }
            }

            .error-container h1 {
                font-size: 2.2rem;
                font-weight: 600;
                margin-bottom: 15px;
                color: var(--black-cl-2, #333);
            }

            .error-container p {
                font-size: 1.6rem;
                color: #555;
                line-height: 1.7;
                margin-bottom: 10px;
            }

            .error-message-box {
                background-color: #f8d7da;
                color: #721c24;
                padding: 15px;
                border-radius: 5px;
                font-size: 1.4rem;
                margin-bottom: 35px;
                display: inline-block;
            }

            .btn-error-actions a.btn {
                font-size: 1.4rem;
                padding: 12px 24px;
                margin: 0 10px;
                text-transform: uppercase;
                font-weight: 600;
                transition: var(--base-transition, all 0.3s ease);
            }

            .btn-error-actions a.btn:hover {
                 transform: translateY(-2px) scale(1.02);
                 box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            }

            .btn.btn-danger {
                background-color: var(--danger-cl, #dc3545);
                border-color: var(--danger-cl, #dc3545);
                color: var(--white-cl-1, #fff);
            }

            .btn.btn-danger:hover {
                background-color: var(--danger-cl-darker, #c82333);
                border-color: var(--danger-cl-darker, #c82333);
                color: var(--white-cl-1, #fff);
            }

            .btn.btn-outline-secondary {
                color: var(--default-cl, #9e5bab);
                border-color: var(--default-cl, #9e5bab);
                background-color: transparent;
            }

            .btn.btn-outline-secondary:hover {
                background-color: var(--default-cl, #9e5bab);
                border-color: var(--default-cl, #9e5bab);
                color: var(--white-cl-1, #fff);
            }
        </style>
    </th:block>
</head>
<body>
<div layout:fragment="content">
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-times-circle"></i>
        </div>
        <h1>Thanh toán thất bại!</h1>
        <p>Rất tiếc, quá trình thanh toán qua VNPay của bạn không thành công.</p>

        <div class="error-message-box" th:if="${message}">
            <span th:text="${message}">Mã lỗi VNPAY: Lỗi không xác định</span>
        </div>

        <div class="btn-error-actions">
            <a th:href="@{/cart}" class="btn btn-danger">Thử lại thanh toán</a>
            <a th:href="@{/products}" class="btn btn-outline-secondary">Tiếp tục mua sắm</a>
        </div>
    </div>
</div>
</body>
</html>
