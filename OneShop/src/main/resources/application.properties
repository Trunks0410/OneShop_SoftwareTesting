# ==========================================
# 1. APPLICATION CONFIGURATION
# ==========================================
spring.application.name=OneShop
server.servlet.session.timeout=30m

# ==========================================
# 2. DATABASE & JPA (MYSQL)
# ==========================================
# Thêm tham số createDatabaseIfNotExist=true để tự động tạo DB OneShop
spring.datasource.url=jdbc:mysql://localhost:3306/OneShop?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Nhập tài khoản MySQL của bạn 
spring.datasource.username=root
spring.datasource.password=1042005trungall

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# ==========================================
# 3. ENCODING & WEB MVC (JSP)
# ==========================================
server.servlet.encoding.charset=UTF-8
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
spring.messages.encoding=UTF-8

# JSP View Resolver - GIỮ LẠI VÀ CẬP NHẬT
spring.web.servlet.jsp.prefix=/WEB-INF/decorators/
spring.web.servlet.jsp.suffix=.jsp

